<!DOCTYPE html>
<html>
<head>
<title>Secure File Share</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Secure File Sharing</h2>

<div class="card shadow p-4">

<form action="upload" method="post" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Select files</label>
<input type="file" name="files" multiple class="form-control">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" name="burn">
<label class="form-check-label">Burn after first download</label>
</div>

<button class="btn btn-primary w-100">Upload Files</button>

</form>

</div>

<div class="text-center mt-3">
<a href="download.html">Download using OTP</a>
</div>

</div>

</body>
</html>
